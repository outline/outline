# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud — HU-01: Filtrado de historial de revisiones (Outline)
# Reemplaza los valores marcados con <LLENAR> antes de ejecutar.
# ─────────────────────────────────────────────────────────────────────────────

sonar.host.url=https://sonarcloud.io
sonar.organization=esteban1903
sonar.projectKey=esteban1903_outline-hu01
sonar.token=dcb03520af904db091688a9d0cd9fdaf6bb62ae4
sonar.projectName=Outline HU-01 Revision History
sonar.projectVersion=1.0

# Archivos fuente a analizar (únicamente los creados/modificados para HU-01)
sonar.sources=server/routes/api/revisions/revisions-filters.ts,server/routes/api/revisions/revisions.ts,server/routes/api/revisions/schema.ts,server/presenters/revision.ts
sonar.tests=server/routes/api/revisions
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusiones de análisis
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.js

# Exclusiones de cobertura: rutas y schemas pre-existentes fuera del alcance de HU-01
# revisions.ts y schema.ts contienen rutas (info, update, delete, export) que no
# forman parte de HU-01 y no tienen tests en este entregable.
# La cobertura se mide sobre el código nuevo/modificado para HU-01:
# revisions-filters.ts (función pura nueva) y revision.ts (presentador modificado).
sonar.coverage.exclusions=**/revisions.ts,**/schema.ts

# Cobertura de pruebas (generada por: yarn test:server --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
