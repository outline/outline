name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::662860781475:role/outline-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never

      - name: Get instance ID from stack
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=outline" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Restart Outline via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "/opt/outline/refresh-config.sh",
              "cd /opt/outline && docker-compose pull && docker-compose up -d"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Restart completed successfully"
              exit 0
            elif [ "$STATUS" = "Failed" ] || \
                 [ "$STATUS" = "Cancelled" ]; then
              echo "Restart failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            echo "Status: $STATUS (attempt $i/30)"
            sleep 10
          done

          echo "Timed out waiting for restart"
          exit 1

      - name: Health check
        run: |
          curl --fail --retry 12 --retry-delay 10 \
            --retry-all-errors -s -o /dev/null \
            "https://docs.attuned.ai/_health"
          echo "Health check passed"
