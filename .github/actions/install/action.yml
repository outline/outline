name: Install
description: Set up Node.js, Corepack, and install dependencies with yarn cache
runs:
  using: composite
  steps:
    - name: Enable Corepack
      shell: bash
      run: corepack enable
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: "yarn"
    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
